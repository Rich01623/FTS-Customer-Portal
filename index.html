<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Transport | Secure Booking Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --frost-red: #c32026; --frost-grey: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        #authOverlay { position: fixed; inset: 0; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .frost-card { position: relative; z-index: 10; background: white; border-radius: 6px; border: 1px solid #cbd5e1; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .border-frost-dark { border-top: 8px solid var(--frost-grey); }
        .frost-input { height: 42px; border: 1px solid #cbd5e1; padding: 0 0.75rem; border-radius: 4px; width: 100%; background: white; font-size: 0.85rem; outline: none; }
        input[type="date"] { font-size: 1.1rem !important; font-weight: 700 !important; color: #1e293b; }
        .label-text { font-size: 10px; font-weight: 900; color: #475569; text-transform: uppercase; margin-bottom: 3px; display: block; }
        #historySidebar { position: fixed; right: -500px; top: 0; width: 500px; height: 100%; background: white; z-index: 150; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 2px solid #e2e8f0; }
        #historySidebar.open { right: 0; }
        #map { width: 100%; height: 235px; border-radius: 6px; margin-top: 15px; border: 2px solid #cbd5e1; background: #e5e7eb; }
        .header-logo { height: 110px; width: auto; object-fit: contain; }
        .pac-container { z-index: 10000 !important; }
    </style>
</head>
<body class="p-6">

    <div id="historySidebar" class="p-8 flex flex-col">
        <div class="flex justify-between items-center border-b-2 border-slate-100 pb-4 mb-6">
            <h2 class="text-2xl font-black italic uppercase text-slate-900">Quote <span class="text-red-600">History</span></h2>
            <button onclick="toggleHistory()" class="text-slate-400 hover:text-red-600"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
        </div>
        <div id="historyList" class="flex-grow overflow-y-auto space-y-4"></div>
    </div>

    <div id="authOverlay">
        <div class="bg-white p-8 rounded shadow-2xl w-[420px] border-t-8 border-red-600">
            <h2 class="text-2xl font-black italic mb-6 text-center uppercase text-red-600">Frost Portal</h2>
            <div id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="frost-input">
                <input type="password" id="password" placeholder="Password" class="frost-input">
                <button onclick="handleAuth('login')" class="w-full bg-red-600 text-white font-black py-3 rounded uppercase">Login</button>
                <p class="text-center text-[10px] font-bold text-slate-500 cursor-pointer" onclick="toggleAuth(true)">REGISTER NEW ACCOUNT</p>
            </div>
            <div id="regForm" class="hidden space-y-3">
                <input type="text" id="regName" placeholder="Full Name" class="frost-input">
                <input type="text" id="regCompany" placeholder="Company Name" class="frost-input">
                <input type="email" id="regEmail" placeholder="Email Address" class="frost-input">
                <input type="password" id="regPass" placeholder="Set Password" class="frost-input">
                <button onclick="handleAuth('register')" class="w-full bg-slate-900 text-white font-black py-3 rounded uppercase">Create Account</button>
                <p class="text-center text-[10px] font-bold text-slate-500 cursor-pointer" onclick="toggleAuth(false)">BACK TO LOGIN</p>
            </div>
        </div>
    </div>

    <header class="max-w-[1600px] mx-auto mb-6 flex justify-between items-center border-b-2 border-slate-300 pb-4">
        <div class="text-3xl font-black italic text-slate-900">FROST<span class="text-red-600">TRANSPORT</span></div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleHistory()" class="text-[10px] font-black bg-white px-5 py-2 rounded border-2 border-slate-200 uppercase hover:border-red-600 transition-all">
                <i class="fa-solid fa-file-lines mr-2 text-red-600"></i> Previous Quotes
            </button>
            <button onclick="logout()" class="text-[9px] font-bold text-red-600 uppercase border border-red-600 px-2 h-6 rounded hover:bg-red-50">Logout</button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto grid grid-cols-12 gap-6">
        <div class="col-span-4 space-y-6">
            <section class="frost-card border-frost-dark h-[180px] flex flex-col justify-center items-center">
                <i class="fa-solid fa-circle-user text-red-600 text-3xl mb-2"></i>
                <h2 class="text-xl font-black italic text-slate-900 uppercase">Welcome, <span id="welcomeName">User</span></h2>
                <div class="hidden"><input type="text" id="custName"><input type="text" id="custCompany"><input type="text" id="custEmail"></div>
            </section>

            <section class="frost-card border-frost-dark">
                <h3 class="label-text text-slate-400">01. Journey & Route</h3>
                <div class="grid grid-cols-2 gap-4 mt-2 mb-4">
                    <div><span class="label-text">Collection</span><input type="text" id="pickup" class="frost-input uppercase font-bold" placeholder="Postcode / City"></div>
                    <div><span class="label-text">Delivery</span><input type="text" id="delivery" class="frost-input uppercase font-bold" placeholder="Postcode / City"></div>
                </div>
                <div class="flex gap-2 mb-4">
                    <label class="flex-1 flex items-center justify-center gap-2 p-2 border rounded bg-white cursor-pointer"><input type="checkbox" id="multiDropCheck" onchange="toggleMultiDrop()"><span class="text-[9px] font-black uppercase">Multi-Drop</span></label>
                    <label id="optiContainer" class="flex-1 flex items-center justify-center gap-2 p-2 border rounded bg-white opacity-40 cursor-pointer"><input type="checkbox" id="optimizeCheck" onchange="calculate()" disabled><span class="text-[9px] font-black uppercase">Optimize</span></label>
                </div>
                <div id="waypointContainer" style="display: none;" class="mb-4">
                    <span class="label-text text-red-600 font-black">Waypoints (One per line)</span>
                    <textarea id="waypoints" class="frost-input text-[10px] font-bold h-20 pt-2 uppercase" onchange="calculate()"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3 bg-slate-100 p-4 rounded border border-slate-200">
                    <div class="text-center border-r border-slate-200"><span class="label-text">Total Miles</span><div id="mileDisp" class="text-2xl font-black italic text-slate-900">0</div></div>
                    <div class="text-center"><span class="label-text">Drive Time</span><div id="timeDisp" class="text-2xl font-black italic text-slate-900">0h</div></div>
                </div>
            </section>
        </div>

        <div class="col-span-5 space-y-6">
            <section class="frost-card border-frost-dark h-[604px]">
                <h3 class="label-text text-slate-400">02. Logistics & Map</h3>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3 mt-2 mb-4">
                    <div><span class="label-text">Coll. Date</span><input type="date" id="collDate" class="frost-input" onchange="matchDates()"></div>
                    <div><span class="label-text">Del. Date</span><input type="date" id="delDate" class="frost-input" onchange="update()"></div>
                </div>
                <div id="map"></div>
            </section>
        </div>

        <div class="col-span-3">
            <div class="bg-slate-900 text-white p-6 h-[604px] rounded-lg shadow-2xl flex flex-col justify-between border-b-8 border-red-600">
                <div>
                    <h2 class="text-red-500 font-black italic uppercase text-[10px] mb-6 border-b border-slate-700 pb-2">Summary</h2>
                    <div id="breakdownList" class="space-y-4 text-[11px] font-mono text-slate-400">
                        <p>Awaiting journey details...</p>
                    </div>
                </div>
                <div class="text-center">
                    <span class="label-text text-slate-500">Total (Ex VAT)</span>
                    <div id="totalDisp" class="text-5xl font-black italic text-white">£0.00</div>
                    <button id="confirmBtn" onclick="saveJob()" class="w-full bg-red-600 mt-6 hover:bg-red-700 text-white py-4 rounded font-black text-sm uppercase">Submit Enquiry</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDOPkYduNBvti4HWX2izIhCrrQ02uk5SL0&libraries=geometry,places&callback=initMap"></script>

    <script>
        // CONFIG
        const HOURLY_TOTAL = 61.241826; 
        const MPG = 8; 
        const LTR_GAL = 4.546;
        const FIXED_MARGIN = 25; 
        const FIXED_PPL = 1.25; 

        // SUPABASE
        const _URL = "https://tdrzytgiqvdulityqttr.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcnp5dGdpcXZkdWxpdHlxdHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5NTMsImV4cCI6MjA4ODcyOTk1M30.XN46i7u6STD-2afmN7-Jh1MltADGpEuWlLt_n7wknbA";
        const sb = supabase.createClient(_URL, _KEY);

        let map, directionsService, directionsRenderer;
        let routeMiles = 0; let driveHrs = 0;

        function initMap() {
            if (typeof google === 'undefined') return;
            try {
                directionsService = new google.maps.DirectionsService();
                directionsRenderer = new google.maps.DirectionsRenderer({ 
                    polylineOptions: { strokeColor: "#c32026", strokeWeight: 6, strokeOpacity: 0.9 } 
                });
                map = new google.maps.Map(document.getElementById("map"), { 
                    zoom: 6, center: { lat: 52.3, lng: -1.1 },
                    disableDefaultUI: true
                });
                directionsRenderer.setMap(map);

                // Autocomplete setup
                const opts = { componentRestrictions: { country: "gb" } };
                const autoP = new google.maps.places.Autocomplete(document.getElementById('pickup'), opts);
                const autoD = new google.maps.places.Autocomplete(document.getElementById('delivery'), opts);
                
                autoP.addListener('place_changed', calculate);
                autoD.addListener('place_changed', calculate);
            } catch(e) { console.error("Map Load Fail", e); }
        }

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session?.user) setupUser(session.user);
            else document.getElementById('authOverlay').style.display = 'flex';
        };

        function setupUser(user) {
            document.getElementById('authOverlay').style.display = 'none';
            const fullName = user.user_metadata.full_name || "Valued Client";
            document.getElementById('welcomeName').innerText = fullName.split(' ')[0];
            document.getElementById('custName').value = fullName;
            document.getElementById('custEmail').value = user.email;
            
            // Re-trigger map layout if it was hidden
            setTimeout(() => { if(map) google.maps.event.trigger(map, 'resize'); }, 500);
            update();
        }

        function calculate() {
            const p = document.getElementById('pickup').value;
            const d = document.getElementById('delivery').value;
            if (p.length < 3 || d.length < 3) return;

            let wps = [];
            if (document.getElementById('multiDropCheck').checked) {
                document.getElementById('waypoints').value.split('\n').forEach(l => { if(l.trim()) wps.push({location: l.trim(), stopover: true}); });
            }

            directionsService.route({ 
                origin: p, destination: d, waypoints: wps, 
                optimizeWaypoints: document.getElementById('optimizeCheck').checked, 
                travelMode: 'DRIVING' 
            }, (res, stat) => {
                if (stat === 'OK') {
                    directionsRenderer.setDirections(res);
                    let m = 0; let s = 0;
                    res.routes[0].legs.forEach(leg => { m += leg.distance.value; s += leg.duration.value; });
                    routeMiles = Math.round((m * 0.000621371) * 1.05);
                    driveHrs = (s / 3600) * 1.25;
                    document.getElementById('mileDisp').innerText = routeMiles;
                    document.getElementById('timeDisp').innerText = Math.round(driveHrs) + "h";
                    update();
                }
            });
        }

        function update() {
            const baseCost = (driveHrs * HOURLY_TOTAL) + ((routeMiles / MPG) * LTR_GAL * FIXED_PPL);
            const finalTotal = baseCost * (1 + (FIXED_MARGIN/100));
            const quote = Math.ceil((finalTotal) / 10) * 10;
            
            if (routeMiles > 0) {
                document.getElementById('totalDisp').innerText = '£' + quote.toLocaleString();
                document.getElementById('breakdownList').innerHTML = `<div class="flex justify-between"><span>MILES:</span><span>${routeMiles}</span></div><div class="flex justify-between"><span>EST. TIME:</span><span>${driveHrs.toFixed(1)}H</span></div>`;
            }
        }

        async function saveJob() {
            const { data: { user } } = await sb.auth.getUser();
            const val = parseFloat(document.getElementById('totalDisp').innerText.replace(/[£,]/g,''));
            if(val <= 0) return alert("Please calculate a route first.");

            const { error } = await sb.from('quotes').insert([{ 
                user_id: user.id, pickup: document.getElementById('pickup').value, 
                delivery: document.getElementById('delivery').value, total_price: val 
            }]);
            if (!error) alert("Quote submitted!");
        }

        async function handleAuth(type) {
            const email = document.getElementById(type === 'login' ? 'email' : 'regEmail').value;
            const password = document.getElementById(type === 'login' ? 'password' : 'regPass').value;
            
            if (type === 'register') {
                const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: document.getElementById('regName').value } } });
                if (error) alert(error.message); else alert("Check email for confirmation!");
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) alert(error.message); else setupUser(data.user);
            }
        }

        function toggleAuth(reg) { document.getElementById('loginForm').classList.toggle('hidden', reg); document.getElementById('regForm').classList.toggle('hidden', !reg); }
        function toggleMultiDrop() {
            const isM = document.getElementById('multiDropCheck').checked;
            document.getElementById('waypointContainer').style.display = isM ? 'block' : 'none';
            document.getElementById('optimizeCheck').disabled = !isM;
            document.getElementById('optiContainer').style.opacity = isM ? '1' : '0.4';
            calculate();
        }
        function matchDates() { document.getElementById('delDate').value = document.getElementById('collDate').value; update(); }
        async function logout() { await sb.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
