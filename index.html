<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Transport | Secure Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Replace Key Below if needed -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDOPkYduNBvti4HWX2izIhCrrQ02uk5SL0&libraries=geometry,places&callback=initMap"></script>
    
    <style>
        :root { --frost-red: #c32026; --frost-dark: #0f172a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; }
        #authOverlay { position: fixed; inset: 0; background: var(--frost-dark); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .frost-input { height: 45px; border: 1px solid #cbd5e1; padding: 0 1rem; border-radius: 6px; width: 100%; font-size: 0.9rem; margin-bottom: 12px; }
        .btn-primary { background: var(--frost-red); color: white; font-weight: 800; text-transform: uppercase; width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #a11a1f; }
        .tab-btn { flex: 1; padding: 10px; font-weight: 800; font-size: 11px; text-transform: uppercase; border-bottom: 3px solid transparent; color: #94a3b8; }
        .tab-active { border-color: var(--frost-red); color: var(--frost-red); }
        #map { width: 100%; height: 300px; border-radius: 8px; background: #e2e8f0; }
        .parking-badge { display: none; background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-top: 5px; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <!-- LOGIN / REGISTER OVERLAY -->
    <div id="authOverlay">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            <div class="flex justify-center mb-6">
                <img src="logo.png" alt="Frost Logo" class="h-20 w-auto">
            </div>

            <div class="flex mb-6 border-b border-slate-100">
                <button id="loginTab" onclick="setAuthMode('login')" class="tab-btn tab-active">Login</button>
                <button id="registerTab" onclick="setAuthMode('register')" class="tab-btn">Register</button>
            </div>

            <div id="authForm" class="space-y-2">
                <div id="regFields" class="hidden">
                    <input type="text" id="regName" placeholder="Full Name" class="frost-input">
                    <input type="text" id="regCompany" placeholder="Company Name" class="frost-input">
                </div>
                <input type="email" id="email" placeholder="Email Address" class="frost-input">
                <input type="password" id="password" placeholder="Password" class="frost-input">
                <button id="mainAuthBtn" onclick="handleAuth()" class="btn-primary mt-4">Access Portal</button>
            </div>
            <p id="authMsg" class="text-[10px] text-center text-slate-400 mt-6 font-bold uppercase tracking-widest">Frost Transport Secure Gateway</p>
        </div>
    </div>

    <!-- MAIN APP CONTENT -->
    <main class="max-w-7xl mx-auto hidden" id="appMain">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <img src="logo.png" alt="Frost" class="h-16">
            <div class="text-right">
                <div id="userBadge" class="font-black text-red-600 text-sm uppercase italic"></div>
                <button onclick="logout()" class="text-[10px] font-bold text-slate-400 uppercase hover:text-red-600">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                    <h3 class="text-red-600 font-black italic uppercase mb-4 text-sm">01. Journey & Date</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">Collection Date</label>
                            <input type="date" id="colDate" class="frost-input" onchange="update()">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">Delivery Date</label>
                            <input type="date" id="delDate" class="frost-input" onchange="update()">
                            <div id="parkingAlert" class="parking-badge"><i class="fa-solid fa-shield-halved"></i> £50 SECURE PARKING ADDED</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <input type="text" id="pickup" placeholder="Collection Postcode" class="frost-input uppercase font-bold" onchange="calculate()">
                        <input type="text" id="delivery" placeholder="Delivery Postcode" class="frost-input uppercase font-bold" onchange="calculate()">
                    </div>
                    <div id="map"></div>
                </div>
            </div>

            <div class="bg-slate-900 text-white p-8 rounded-lg shadow-2xl flex flex-col justify-between h-fit">
                <div>
                    <h2 class="text-red-500 font-black italic uppercase text-xs mb-6 border-b border-slate-700 pb-2">Quote Summary</h2>
                    <div id="breakdown" class="space-y-3 text-sm font-mono text-slate-400 mb-8"></div>
                    <div class="text-center">
                        <span class="text-[10px] text-slate-500 uppercase font-black">Total (Ex. VAT)</span>
                        <div id="totalDisp" class="text-5xl font-black italic text-white mt-1">£0.00</div>
                    </div>
                </div>
                <button onclick="saveJob()" class="btn-primary py-4 mt-8">Confirm Booking</button>
            </div>
        </div>
    </main>

    <script>
        const HOURLY_RATE = 61.24; 
        const MPG = 8;
        const LTR_GAL = 4.546;
        const PPL = 1.25;

        // Supabase Init
        const _URL = "https://tdrzytgiqvdulityqttr.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcnp5dGdpcXZkdWxpdHlxdHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5NTMsImV4cCI6MjA4ODcyOTk1M30.XN46i7u6STD-2afmN7-Jh1MltADGpEuWlLt_n7wknbA";
        const sb = supabase.createClient(_URL, _KEY);

        let map, directionsRenderer, directionsService;
        let authMode = 'login';

        function initMap() {
            try {
                directionsService = new google.maps.DirectionsService();
                directionsRenderer = new google.maps.DirectionsRenderer({
                    polylineOptions: { strokeColor: "#c32026", strokeWeight: 6 }
                });
                map = new google.maps.Map(document.getElementById("map"), {
                    zoom: 6, center: { lat: 52.3, lng: -1.1 }, disableDefaultUI: true
                });
                directionsRenderer.setMap(map);
            } catch (e) {
                console.error("Google Maps failed to load. Check API Key and Billing.", e);
            }
        }

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session?.user) setupUser(session.user);
        };

        function setAuthMode(mode) {
            authMode = mode;
            document.getElementById('loginTab').classList.toggle('tab-active', mode === 'login');
            document.getElementById('registerTab').classList.toggle('tab-active', mode === 'register');
            document.getElementById('regFields').classList.toggle('hidden', mode === 'login');
            document.getElementById('mainAuthBtn').innerText = mode === 'login' ? 'Access Portal' : 'Create Account';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (authMode === 'register') {
                const { error } = await sb.auth.signUp({
                    email, password, options: { data: { full_name: document.getElementById('regName').value, company: document.getElementById('regCompany').value } }
                });
                if (error) alert(error.message);
                else alert("Success! Please check your email to verify your account.");
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else setupUser(data.user);
            }
        }

        function setupUser(user) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('appMain').classList.remove('hidden');
            document.getElementById('userBadge').innerText = user.user_metadata.full_name || user.email;
        }

        function calculate() {
            const p = document.getElementById('pickup').value;
            const d = document.getElementById('delivery').value;
            if (p.length < 3 || d.length < 3) return;

            directionsService.route({
                origin: p, destination: d, travelMode: 'DRIVING'
            }, (res, stat) => {
                if (stat === 'OK') {
                    directionsRenderer.setDirections(res);
                    const leg = res.routes[0].legs[0];
                    const miles = Math.round(leg.distance.value * 0.000621371 * 1.05);
                    const hours = (leg.duration.value / 3600 * 1.25).toFixed(2);
                    
                    // Hidden mileage calculation
                    window.currentMiles = miles;
                    window.currentHours = hours;
                    update();
                }
            });
        }

        function update() {
            const miles = window.currentMiles || 0;
            const driveHrs = parseFloat(window.currentHours) || 0;
            const totalHrs = driveHrs + 2; // Adding 2 hrs for load/tip
            
            const cost = (totalHrs * HOURLY_RATE) + ((miles / MPG) * LTR_GAL * PPL);
            let total = cost * 1.25;

            // Secure Parking Logic
            let parking = 0;
            const cDate = document.getElementById('colDate').value;
            const dDate = document.getElementById('delDate').value;
            if(cDate && dDate && cDate !== dDate) {
                parking = 50;
                document.getElementById('parkingAlert').style.display = 'block';
            } else {
                document.getElementById('parkingAlert').style.display = 'none';
            }

            const final = Math.ceil(((total + parking) - 0.01) / 10) * 10;
            document.getElementById('totalDisp').innerText = `£${final.toFixed(2)}`;
            document.getElementById('breakdown').innerHTML = `
                <div class="flex justify-between"><span>Miles</span><span>${miles}</span></div>
                <div class="flex justify-between"><span>Base Rate</span><span>£${total.toFixed(2)}</span></div>
                ${parking > 0 ? `<div class="flex justify-between text-red-500 font-bold"><span>Secure Parking</span><span>£50.00</span></div>` : ''}
            `;
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }
        
        async function saveJob() {
            alert("Quote Sent to Frost Transport!");
        }
    </script>
</body>
</html>
